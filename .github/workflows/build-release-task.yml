name: Build project release task

on:
  workflow_call:
    inputs:
      # Input to control whether to create a GitHub release
      github:
        required: false
        type: boolean
        default: false
      # Input to control whether to push the docker image to Docker Hub
      dockerhub:
        required: false
        type: boolean
        default: false

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  build-executable:
    name: Build executable job
    uses: ./.github/workflows/build-executable-task.yml
    secrets: inherit

  build-docker:
    name: Build Docker job
    uses: ./.github/workflows/build-docker-task.yml
    secrets: inherit
    with:
      # Conditional push to Docker Hub
      push: ${{ inputs.dockerhub }}

  github-release:
    name: Publish GitHub release job
    if: ${{ inputs.github }}
    runs-on: ubuntu-latest
    needs: [get-version, build-executable, build-docker]

    steps:

      - name: Checkout code step
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download executable build artifacts step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build-executable.outputs.artifact-id }}
          path: ./Publish

      - name: Create GitHub release step
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.get-version.outputs.SemVer2 }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_name != 'main' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            LICENSE
            README.md
            ./Publish/*
