name: Build project release task

on:
  workflow_call:
    inputs:
      # Input to control whether to create a GitHub release
      github:
        required: false
        type: boolean
        default: false
      # Input to control whether to push the docker image to Docker Hub
      dockerhub:
        required: false
        type: boolean
        default: false

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  build-executable:
    name: Build executable job
    uses: ./.github/workflows/build-executable-task.yml
    secrets: inherit

  build-docker:
    name: Build Docker job
    uses: ./.github/workflows/build-docker-task.yml
    secrets: inherit
    with:
      # Conditional push to Docker Hub
      push: ${{ inputs.dockerhub }}

  github-release:
    name: Publish GitHub release job
    if: ${{ inputs.github }}
    runs-on: ubuntu-latest
    needs: [get-version, build-executable, build-docker]

    steps:

      - name: Checkout code step
        uses: actions/checkout@v6

      - name: Download executable build artifacts step
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.build-executable.outputs.artifact-id }}
          path: ./Publish

      - name: Create GitHub release step
        # softprops creates the underlying tag from `tag_name` if it does not
        # already exist, so the workflow drives the entire release lifecycle:
        # NBGV computes the version, this step creates the tag + release with
        # auto-generated notes, and the artifacts are attached in one shot.
        # `target_commitish` MUST be set explicitly: softprops doesn't pass a
        # default through, and GitHub's REST API then defaults the new tag to
        # the repository's default branch (main). On `push: develop` runs the
        # tag would land on main's tip instead of the develop commit that
        # built the artifact, leaving "Browse files" and `git checkout <tag>`
        # pointing at unrelated code.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.get-version.outputs.SemVer2 }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_name != 'main' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            LICENSE
            README.md
            ./Publish/*
