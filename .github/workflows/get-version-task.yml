name: Get version information task

# Run NBGV once and expose the version outputs. The publisher passes the exact commit it publishes as ref, and
# github.ref still names the branch that commit belongs to (one branch per run), so NBGV classifies it correctly
# without overriding github.ref.
on:
  workflow_call:
    inputs:
      # Git ref to check out / version (empty = caller's default checkout ref).
      ref:
        required: false
        type: string
        default: ''
    outputs:
      SemVer2:
        value: ${{ jobs.get-version.outputs.SemVer2 }}
      AssemblyVersion:
        value: ${{ jobs.get-version.outputs.AssemblyVersion }}
      AssemblyFileVersion:
        value: ${{ jobs.get-version.outputs.AssemblyFileVersion }}
      AssemblyInformationalVersion:
        value: ${{ jobs.get-version.outputs.AssemblyInformationalVersion }}
      # Full SHA NBGV versioned; pins the release tag to the exact built commit, not a moving ref.
      GitCommitId:
        value: ${{ jobs.get-version.outputs.GitCommitId }}

jobs:

  get-version:
    name: Get version information job
    runs-on: ubuntu-latest
    outputs:
      SemVer2: ${{ steps.nbgv.outputs.SemVer2 }}
      AssemblyVersion: ${{ steps.nbgv.outputs.AssemblyVersion }}
      AssemblyFileVersion: ${{ steps.nbgv.outputs.AssemblyFileVersion }}
      AssemblyInformationalVersion: ${{ steps.nbgv.outputs.AssemblyInformationalVersion }}
      GitCommitId: ${{ steps.nbgv.outputs.GitCommitId }}

    steps:

      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.x

      - name: Checkout code step
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      # Float nbgv on `master`, not SHA-pinned: its tag stream lags `master`, so Dependabot
      # tag-tracking would only propose downgrades to stale tags (WORKFLOW.md D9.1).
      - name: Run Nerdbank.GitVersioning tool step
        id: nbgv
        uses: dotnet/nbgv@master
